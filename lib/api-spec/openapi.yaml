openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FabricPro Job Work Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management
  - name: connections
    description: User connection management
  - name: slips
    description: Slip/transaction management
  - name: payments
    description: Payment management
  - name: notifications
    description: Notification management
  - name: dashboard
    description: Dashboard data
  - name: gallery
    description: Common image gallery

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # --- AUTH / USER ---
  /auth/login:
    post:
      operationId: login
      tags: [users]
      summary: Login with mobile number (sends OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/login-password:
    post:
      operationId: loginWithPassword
      tags: [users]
      summary: Login with mobile + password (no OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPasswordRequest"
      responses:
        "200":
          description: Logged in, returns user and session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [users]
      summary: Send OTP to reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OTP sent for password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [users]
      summary: Verify OTP and get session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
      responses:
        "200":
          description: Verified, returns user and session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/kyc:
    post:
      operationId: submitKyc
      tags: [users]
      summary: Submit KYC (name + mobile)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycRequest"
      responses:
        "200":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current logged in user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/logout:
    post:
      operationId: logout
      tags: [users]
      summary: Logout
      responses:
        "200":
          description: Logged out

  # --- CONNECTIONS ---
  /connections:
    get:
      operationId: getConnections
      tags: [connections]
      summary: Get all connections for current user
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected]
      responses:
        "200":
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Connection"
    post:
      operationId: sendConnectionRequest
      tags: [connections]
      summary: Send connection request by user code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionRequest"
      responses:
        "200":
          description: Request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /connections/{id}/accept:
    post:
      operationId: acceptConnection
      tags: [connections]
      summary: Accept a connection request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  /connections/{id}/reject:
    post:
      operationId: rejectConnection
      tags: [connections]
      summary: Reject a connection request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connection"

  # --- SLIPS ---
  /slips:
    get:
      operationId: getSlips
      tags: [slips]
      summary: Get all slips for current user
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [maal_issue, maal_receive, maal_return]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, seen, completed]
        - name: connectionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of slips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slip"
    post:
      operationId: createSlip
      tags: [slips]
      summary: Create a new slip/transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlipRequest"
      responses:
        "200":
          description: Created slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slip"

  /slips/{id}:
    get:
      operationId: getSlip
      tags: [slips]
      summary: Get slip details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Slip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slip"

  /slips/{id}/status:
    patch:
      operationId: updateSlipStatus
      tags: [slips]
      summary: Update slip status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSlipStatusRequest"
      responses:
        "200":
          description: Updated slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Slip"

  # --- JOB SLIPS (Maal Dena / Maal Aya) ---
  /job-slips:
    get:
      operationId: getJobSlips
      tags: [slips]
      summary: Get job slips for current user
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [seth, karigar]
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, viewed, confirmed, completed]
      responses:
        "200":
          description: List of job slips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSlip"
    post:
      operationId: createJobSlip
      tags: [slips]
      summary: Create a new Maal Dena slip (Seth only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobSlipRequest"
      responses:
        "200":
          description: Created job slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSlip"

  /job-slips/{id}:
    get:
      operationId: getJobSlip
      tags: [slips]
      summary: Get job slip detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job slip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSlip"

  /job-slips/{id}/send:
    patch:
      operationId: sendJobSlip
      tags: [slips]
      summary: Send draft slip to karigar (Seth action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSlip"

  /job-slips/{id}/view:
    patch:
      operationId: markJobSlipViewed
      tags: [slips]
      summary: Mark slip as viewed (Karigar)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSlip"

  /job-slips/{id}/confirm:
    patch:
      operationId: confirmJobSlip
      tags: [slips]
      summary: Confirm maal received (Karigar OK)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobSlip"

  /job-slips/seth/{sethId}/pending:
    get:
      operationId: getPendingSlipsForSeth
      tags: [slips]
      summary: Get pending (balance > 0) job slips for a Seth (for karigar return)
      parameters:
        - name: sethId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of pending job slips with balance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobSlipWithBalance"

  # --- RETURN SLIPS (Maal Wapas Jama) ---
  /return-slips:
    get:
      operationId: getReturnSlips
      tags: [slips]
      summary: Get return slips for current user
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [karigar, seth]
      responses:
        "200":
          description: List of return slips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReturnSlip"
    post:
      operationId: createReturnSlip
      tags: [slips]
      summary: Create a Maal Wapas Jama slip (Karigar)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReturnSlipRequest"
      responses:
        "200":
          description: Created return slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnSlip"

  /return-slips/{id}:
    get:
      operationId: getReturnSlip
      tags: [slips]
      summary: Get return slip detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Return slip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnSlip"

  /return-slips/{id}/view:
    patch:
      operationId: markReturnSlipViewed
      tags: [slips]
      summary: Seth marks return slip as viewed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated return slip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnSlip"

  # --- PAYMENTS ---
  /payments:
    get:
      operationId: getPayments
      tags: [payments]
      summary: Get all payments for current user
      parameters:
        - name: connectionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a manual payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "200":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/pending-slips:
    get:
      operationId: getPendingPaymentSlips
      tags: [payments]
      summary: Get slips with pending payment balance for a connection
      parameters:
        - name: connectionId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of slips with payment balance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SlipWithPaymentBalance"

  /payments/record-slip-payment:
    post:
      operationId: recordSlipPayment
      tags: [payments]
      summary: Record payment for one or more slips
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordSlipPaymentRequest"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  paymentsCreated:
                    type: integer
                required: [success, paymentsCreated]

  # --- NOTIFICATIONS ---
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      summary: Get notifications for current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read

  # --- DASHBOARD ---
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats for current user
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity (slips + payments)
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # --- CHAT ---
  /chat/conversations:
    get:
      operationId: getChatConversations
      tags: [chat]
      summary: Get all conversations for current user
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /chat/search:
    get:
      operationId: searchChatUsers
      tags: [chat]
      summary: Search users to start a chat with
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPublic"

  /chat/{userId}:
    get:
      operationId: getChatMessages
      tags: [chat]
      summary: Get all messages with a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message to a user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /chat/{userId}/conversation:
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete all messages between current user and another user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # --- USERS (for admin) ---
  /users:
    get:
      operationId: getAllUsers
      tags: [users]
      summary: Get all users (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/chat:
    patch:
      operationId: adminToggleChat
      tags: [users]
      summary: Admin enable/disable chat for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminToggleChatRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/password:
    patch:
      operationId: adminChangePassword
      tags: [users]
      summary: Admin change any user's password
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [users]
      summary: Get all admin-configurable app settings
      responses:
        "200":
          description: Settings key-value map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateAdminSettings
      tags: [users]
      summary: Update one or more app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /admin/users/create-dummy:
    post:
      operationId: createDummyUser
      tags: [users]
      summary: Admin creates a pre-registered dummy user with mobile+password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDummyUserRequest"
      responses:
        "200":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/activate:
    post:
      operationId: activateUser
      tags: [users]
      summary: Admin activate or change plan for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivateUserRequest"
      responses:
        "200":
          description: Activated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/mobile:
    patch:
      operationId: adminChangeMobile
      tags: [users]
      summary: Admin change any user's mobile number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminChangeMobileRequest"
      responses:
        "200":
          description: Mobile changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/heartbeat:
    post:
      operationId: heartbeat
      tags: [users]
      summary: Mark user as online (send heartbeat)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Heartbeat received
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /users/lookup:
    get:
      operationId: lookupUserByCode
      tags: [users]
      summary: Lookup a user by their unique code
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Found user (partial info)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  /users/me/avatar:
    patch:
      operationId: updateAvatar
      tags: [users]
      summary: Update user profile avatar (base64 image)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAvatarRequest"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUserById
      tags: [users]
      summary: Get a user's public profile by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"

  # --- GALLERY ---
  /gallery:
    get:
      operationId: getGallery
      tags: [gallery]
      summary: Get gallery images (retention-filtered per plan)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Gallery images list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPage"
    post:
      operationId: uploadGalleryImage
      tags: [gallery]
      summary: Upload an image to the gallery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadGalleryImageRequest"
      responses:
        "201":
          description: Uploaded image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete own gallery image (soft delete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /gallery/my-limit:
    get:
      operationId: getGalleryLimit
      tags: [gallery]
      summary: Get current user's gallery retention limit info
      responses:
        "200":
          description: Gallery limit info for current plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryLimitInfo"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginRequest:
      type: object
      properties:
        mobile:
