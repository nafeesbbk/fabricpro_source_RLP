kind = "web"
previewPath = "/"
title = "FabricPro"
version = "1.0.0"
id = "artifacts/fabricpro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22909

[services.development]
run = "pnpm --filter @workspace/fabricpro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fabricpro", "run", "build" ]
publicDir = "artifacts/fabricpro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22909"
BASE_PATH = "/"
